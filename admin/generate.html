<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡密生成工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; padding: 40px 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    h1 { font-size: 22px; margin-bottom: 8px; }
    .subtitle { color: #888; margin-bottom: 30px; font-size: 14px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; color: #aaa; margin-bottom: 4px; }
    .field input { width: 100%; padding: 10px 12px; border: 1px solid #333; border-radius: 6px; background: #16213e; color: #eee; font-size: 14px; }
    .field input:focus { outline: none; border-color: #4285f4; }
    .row { display: flex; gap: 12px; align-items: flex-end; }
    .row .field { flex: 1; }
    button { padding: 10px 20px; background: #4285f4; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
    button:hover { background: #3367d6; }
    .output { margin-top: 24px; }
    .output-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .output-header span { font-size: 13px; color: #888; }
    #copyBtn { font-size: 12px; padding: 6px 12px; background: #333; }
    #copyBtn:hover { background: #555; }
    #result { width: 100%; min-height: 200px; padding: 12px; border: 1px solid #333; border-radius: 6px; background: #0f3460; color: #7ec8e3; font-family: 'Menlo', monospace; font-size: 13px; line-height: 1.8; resize: vertical; }
    .tip { margin-top: 16px; font-size: 12px; color: #666; }
    .warning { background: #2d1b00; border: 1px solid #664400; border-radius: 6px; padding: 12px; margin-bottom: 20px; font-size: 13px; color: #ffaa00; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔑 卡密生成工具</h1>
    <p class="subtitle">本地使用，不需要部署到服务器。生成的卡密发给闲鱼客户即可。</p>

    <div class="warning">
      ⚠️ 密钥必须和服务器 .env 中的 CARD_SECRET 一致，否则生成的卡密无法验证通过。
    </div>

    <div class="row">
      <div class="field">
        <label>HMAC 密钥 (CARD_SECRET)</label>
        <input type="text" id="secret" value="gemini-vip-secret-2026" placeholder="和服务器.env中的一致">
      </div>
      <div class="field" style="flex:0.4;">
        <label>生成数量</label>
        <input type="number" id="count" value="5" min="1" max="100">
      </div>
    </div>

    <button onclick="generate()" style="margin-top: 16px; width: 100%;">生成卡密</button>

    <div class="output">
      <div class="output-header">
        <span id="countLabel"></span>
        <button id="copyBtn" onclick="copyAll()">复制全部</button>
      </div>
      <textarea id="result" readonly placeholder="点击上方按钮生成..."></textarea>
    </div>

    <p class="tip">💡 每个卡密只能使用一次。生成后直接发给客户，格式如: A3KX9MPQ-f7c2b1d8</p>
  </div>

  <script>
    const CHARSET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';

    async function hmacSign(secret, payload) {
      const enc = new TextEncoder();
      const key = await crypto.subtle.importKey('raw', enc.encode(secret), { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
      const sig = await crypto.subtle.sign('HMAC', key, enc.encode(payload));
      return Array.from(new Uint8Array(sig)).map(b => b.toString(16).padStart(2, '0')).join('').slice(0, 8);
    }

    function randomPayload() {
      const arr = new Uint8Array(8);
      crypto.getRandomValues(arr);
      return Array.from(arr).map(b => CHARSET[b % CHARSET.length]).join('');
    }

    async function generate() {
      const secret = document.getElementById('secret').value.trim();
      const count = parseInt(document.getElementById('count').value) || 5;
      if (!secret) { alert('请输入密钥'); return; }

      const keys = [];
      for (let i = 0; i < count; i++) {
        const payload = randomPayload();
        const sig = await hmacSign(secret, payload);
        keys.push(`${payload}-${sig}`);
      }

      document.getElementById('result').value = keys.join('\n');
      document.getElementById('countLabel').textContent = `已生成 ${count} 个卡密`;
    }

    function copyAll() {
      const text = document.getElementById('result').value;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = '已复制 ✓';
        setTimeout(() => btn.textContent = '复制全部', 2000);
      });
    }

    // 页面加载自动生成一批
    generate();
  </script>
</body>
</html>
