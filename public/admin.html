<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .table-wrap { overflow-x: auto; margin-top: 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 1400px; }
    th, td { padding: 8px 6px; text-align: left; border-bottom: 1px solid #eee; white-space: nowrap; }
    th { background: #f8f9fa; font-weight: 500; color: #555; position: sticky; top: 0; }
    td a { color: #4285f4; word-break: break-all; white-space: normal; max-width: 200px; display: inline-block; }
    td.wrap { white-space: normal; max-width: 150px; word-break: break-all; }
    .stats { display: flex; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
    .stat-card { background: #f0f7ff; padding: 16px 20px; border-radius: 8px; flex: 1; text-align: center; min-width: 120px; }
    .stat-card .num { font-size: 28px; font-weight: 700; color: #4285f4; }
    .stat-card .label { font-size: 12px; color: #666; margin-top: 4px; }
    #loginBox { max-width: 300px; margin: 80px auto; text-align: center; }
    #loginBox input { margin-bottom: 12px; }
    .empty { text-align: center; color: #999; padding: 40px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
    .badge-success { background: #dcfce7; color: #166534; }
    .badge-running { background: #fef3c7; color: #92400e; }
    .badge-failed { background: #fee2e2; color: #991b1b; }
    .badge-pending { background: #f3f4f6; color: #6b7280; }
    .copy-btn { cursor: pointer; font-size: 11px; color: #4285f4; border: none; background: none; padding: 0 2px; }
    .copy-btn:hover { text-decoration: underline; }
    .btn-action { padding: 4px 10px; font-size: 11px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; background: #fff; color: #333; }
    .btn-action:hover { background: #f0f7ff; border-color: #4285f4; color: #4285f4; }
    .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }
    .tools-section { margin: 24px 0; padding: 20px; background: #f8fafe; border: 1px solid #e3ebf6; border-radius: 10px; }
    .tools-section h3 { font-size: 14px; margin-bottom: 16px; color: #333; }
    .tool-row { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
    .tool-row input { flex: 1; min-width: 200px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
    .tool-row button { padding: 8px 16px; font-size: 13px; border: none; border-radius: 6px; cursor: pointer; white-space: nowrap; }
    .btn-primary { background: #3b5bdb; color: #fff; }
    .btn-primary:hover { background: #2f4abf; }
    .btn-secondary { background: #f59e0b; color: #fff; }
    .btn-secondary:hover { background: #d97706; }
    .tool-result { margin-top: 8px; padding: 10px 14px; background: #fff; border: 1px solid #e3ebf6; border-radius: 6px; font-size: 12px; color: #333; }
    /* Modal */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal-box { background: #fff; border-radius: 12px; padding: 24px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .modal-box h3 { margin-bottom: 16px; }
    .modal-box .key-list { font-family: monospace; font-size: 14px; line-height: 2; background: #f8f9fa; padding: 16px; border-radius: 8px; user-select: all; }
    .modal-box .modal-actions { margin-top: 16px; display: flex; gap: 12px; justify-content: flex-end; }
  </style>
</head>
<body>
  <div class="container" style="max-width: 1500px;">
    <!-- 登录 -->
    <div id="loginBox">
      <h2>🔒 管理后台</h2>
      <p style="color:#666;margin:12px 0;">请输入管理员密码</p>
      <div class="field">
        <input type="password" id="pwd" placeholder="密码" onkeydown="if(event.key==='Enter')login()">
      </div>
      <button onclick="login()" style="width:100%;">登录</button>
      <p id="loginErr" class="error" style="display:none;margin-top:8px;"></p>
    </div>

    <!-- 数据面板 -->
    <div id="panel" style="display:none;">
      <h1>📊 认证记录</h1>

      <!-- 工具区 -->
      <div class="tools-section">
        <h3>🛠️ 管理工具</h3>
        <!-- 更新 Telegram Session -->
        <div class="tool-row">
          <input type="text" id="sessionInput" placeholder="输入新的 Telegram Session 字符串..." />
          <button class="btn-primary" onclick="updateSession()">更新 Session</button>
        </div>
        <div id="sessionResult" class="tool-result" style="display:none;"></div>

        <!-- 生成 Key -->
        <div class="tool-row" style="margin-top: 16px;">
          <input type="number" id="keyCount" value="5" min="1" max="100" style="max-width:80px;" placeholder="数量" />
          <button class="btn-secondary" onclick="generateKeys()">生成卡密</button>
        </div>

        <!-- 更新信用卡信息 -->
        <div style="margin-top: 20px; padding-top: 16px; border-top: 1px solid #e3ebf6;">
          <h4 style="font-size: 13px; color: #555; margin-bottom: 12px;">💳 信用卡信息 <span id="cardCurrent" style="font-size:11px;color:#999;"></span></h4>
          <div class="tool-row">
            <input type="text" id="cardNumber" placeholder="卡号" style="max-width:200px;" />
            <input type="text" id="cardExpiry" placeholder="有效期 (MM/YY)" style="max-width:120px;" />
            <input type="text" id="cardCvv" placeholder="CVV" style="max-width:80px;" />
          </div>
          <div class="tool-row">
            <input type="text" id="cardName" placeholder="持卡人姓名" style="max-width:200px;" />
            <input type="text" id="cardZip" placeholder="ZIP" style="max-width:120px;" />
            <button class="btn-primary" onclick="updateCard()">更新卡信息</button>
            <button class="btn-action" onclick="loadCardInfo()">查看当前</button>
          </div>
          <div id="cardResult" class="tool-result" style="display:none;"></div>
        </div>
      </div>

      <div class="stats">
        <div class="stat-card"><div class="num" id="totalCount">0</div><div class="label">提交总数</div></div>
        <div class="stat-card"><div class="num" id="tgSuccessCount">0</div><div class="label">TG认证成功</div></div>
        <div class="stat-card"><div class="num" id="bindSuccessCount">0</div><div class="label">绑卡成功</div></div>
        <div class="stat-card"><div class="num" id="todayCount">0</div><div class="label">今日提交</div></div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>邮箱</th>
              <th>密码</th>
              <th>TOTP Key</th>
              <th>卡密</th>
              <th>Google One Pro 链接</th>
              <th>TG认证</th>
              <th>绑卡</th>
              <th>消息</th>
              <th>提交时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <p id="emptyMsg" class="empty" style="display:none;">暂无记录</p>
      <div style="margin-top:16px;text-align:right;">
        <button onclick="refreshData()" style="font-size:12px;padding:6px 12px;">🔄 刷新</button>
      </div>
    </div>
  </div>

  <!-- 卡密弹窗 -->
  <div class="modal-overlay" id="keyModal">
    <div class="modal-box">
      <h3>🔑 生成的卡密</h3>
      <div class="key-list" id="keyList"></div>
      <div class="modal-actions">
        <button class="btn-primary" onclick="copyAllKeys()">全部复制</button>
        <button class="btn-action" onclick="closeKeyModal()">关闭</button>
      </div>
    </div>
  </div>

  <script>
    let password = '';

    async function login() {
      password = document.getElementById('pwd').value;
      const res = await fetch('/api/admin/logs', { headers: { 'x-admin-password': password } });
      if (!res.ok) {
        document.getElementById('loginErr').textContent = '密码错误';
        document.getElementById('loginErr').style.display = 'block';
        return;
      }
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('panel').style.display = 'block';
      renderData(await res.json());
    }

    async function refreshData() {
      const res = await fetch('/api/admin/logs', { headers: { 'x-admin-password': password } });
      if (res.ok) renderData(await res.json());
    }

    function getBadge(status) {
      const map = {
        'success': '<span class="badge badge-success">成功</span>',
        'running': '<span class="badge badge-running">进行中</span>',
        'failed': '<span class="badge badge-failed">失败</span>',
        'pending': '<span class="badge badge-pending">等待</span>',
        'success_no_link': '<span class="badge badge-running">成功(无链接)</span>',
      };
      return map[status] || `<span class="badge badge-pending">${status}</span>`;
    }

    function renderData(logs) {
      document.getElementById('totalCount').textContent = logs.length;
      document.getElementById('tgSuccessCount').textContent = logs.filter(l => l.telegram_status === 'success' || l.telegram_status === 'success_no_link').length;
      document.getElementById('bindSuccessCount').textContent = logs.filter(l => l.bindcard_status === 'success').length;
      const today = new Date().toISOString().slice(0, 10);
      document.getElementById('todayCount').textContent = logs.filter(l => l.created_at.startsWith(today)).length;

      if (logs.length === 0) {
        document.getElementById('emptyMsg').style.display = 'block';
        return;
      }
      document.getElementById('emptyMsg').style.display = 'none';

      const tbody = document.getElementById('tbody');
      tbody.innerHTML = logs.map((log, i) => `
        <tr>
          <td>${logs.length - i}</td>
          <td class="wrap">${log.email}</td>
          <td class="wrap">${log.password || '-'} <button class="copy-btn" onclick="copyText('${escapeHtml(log.password)}')">复制</button></td>
          <td class="wrap">${log.totp_key || '-'} <button class="copy-btn" onclick="copyText('${escapeHtml(log.totp_key)}')">复制</button></td>
          <td class="wrap">${log.card_key || '-'}</td>
          <td>${log.offer_link ? '<a href="' + log.offer_link + '" target="_blank">' + log.offer_link.slice(0, 40) + '...</a>' : '-'}</td>
          <td>${getBadge(log.telegram_status)}</td>
          <td>${getBadge(log.bindcard_status)}</td>
          <td class="wrap" style="max-width:200px;font-size:11px;color:#666;">${log.message || '-'}</td>
          <td>${new Date(log.created_at).toLocaleString('zh-CN')}</td>
          <td>${getActionBtn(log)}</td>
        </tr>
      `).join('');
    }

    function getActionBtn(log) {
      // 认证成功 + 绑卡非成功 → 显示手动绑卡按钮
      if (log.telegram_status === 'success' && log.bindcard_status !== 'success' && log.offer_link) {
        return `<button class="btn-action" onclick="triggerBindCard(${log.id}, this)">🔄 手动绑卡</button>`;
      }
      if (log.bindcard_status === 'success') {
        return '<span style="color:#16a34a;font-size:11px;">✅ 完成</span>';
      }
      return '-';
    }

    async function triggerBindCard(logId, btn) {
      btn.disabled = true;
      btn.textContent = '触发中...';
      try {
        const res = await fetch('/api/admin/trigger-bindcard', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-password': password },
          body: JSON.stringify({ logId }),
        });
        const data = await res.json();
        if (res.ok) {
          btn.textContent = '✓ 已触发';
          setTimeout(() => refreshData(), 3000);
        } else {
          btn.textContent = '失败';
          alert(data.error || '操作失败');
          setTimeout(() => { btn.disabled = false; btn.textContent = '🔄 手动绑卡'; }, 2000);
        }
      } catch (e) {
        btn.disabled = false;
        btn.textContent = '🔄 手动绑卡';
        alert('网络错误');
      }
    }

    // 更新 Session
    async function updateSession() {
      const session = document.getElementById('sessionInput').value.trim();
      if (!session || session.length < 10) {
        alert('请输入有效的 Session 字符串');
        return;
      }
      const resultEl = document.getElementById('sessionResult');
      resultEl.style.display = 'block';
      resultEl.textContent = '正在更新...';

      try {
        const res = await fetch('/api/admin/update-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-password': password },
          body: JSON.stringify({ session }),
        });
        const data = await res.json();
        resultEl.textContent = data.success
          ? `✅ 更新成功！Telegram 状态: ${data.telegram?.connected ? '已连接' : '未连接'}`
          : `❌ 更新失败: ${data.message}`;
        resultEl.style.color = data.success ? '#166534' : '#991b1b';
      } catch (e) {
        resultEl.textContent = '❌ 网络错误';
        resultEl.style.color = '#991b1b';
      }
    }

    // 生成 Key
    async function generateKeys() {
      const count = parseInt(document.getElementById('keyCount').value) || 5;
      try {
        const res = await fetch('/api/admin/generate-keys', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-password': password },
          body: JSON.stringify({ count }),
        });
        const data = await res.json();
        if (res.ok && data.keys) {
          document.getElementById('keyList').textContent = data.keys.join('\n');
          document.getElementById('keyModal').classList.add('show');
        } else {
          alert(data.error || '生成失败');
        }
      } catch (e) {
        alert('网络错误');
      }
    }

    function copyAllKeys() {
      const text = document.getElementById('keyList').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = event.target;
        btn.textContent = '已复制 ✓';
        setTimeout(() => { btn.textContent = '全部复制'; }, 2000);
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      });
    }

    function closeKeyModal() {
      document.getElementById('keyModal').classList.remove('show');
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => {}).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      });
    }

    // 自动刷新（每30秒）
    setInterval(refreshData, 30000);

    // 加载当前卡信息
    async function loadCardInfo() {
      try {
        const res = await fetch('/api/admin/card-info', { headers: { 'x-admin-password': password } });
        const data = await res.json();
        if (res.ok) {
          document.getElementById('cardCurrent').textContent = `当前: ${data.number} | ${data.expiry} | ${data.name} | ZIP: ${data.zip}`;
        }
      } catch (e) {}
    }

    // 更新信用卡信息
    async function updateCard() {
      const number = document.getElementById('cardNumber').value.trim();
      const expiry = document.getElementById('cardExpiry').value.trim();
      const cvv = document.getElementById('cardCvv').value.trim();
      const name = document.getElementById('cardName').value.trim();
      const zip = document.getElementById('cardZip').value.trim();

      if (!number && !expiry && !cvv && !name && !zip) {
        alert('请至少填写一个字段');
        return;
      }

      const resultEl = document.getElementById('cardResult');
      resultEl.style.display = 'block';
      resultEl.textContent = '正在更新...';
      resultEl.style.color = '#333';

      try {
        const body = {};
        if (number) body.number = number;
        if (expiry) body.expiry = expiry;
        if (cvv) body.cvv = cvv;
        if (name) body.name = name;
        if (zip) body.zip = zip;

        const res = await fetch('/api/admin/update-card', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-password': password },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (res.ok) {
          resultEl.textContent = '✅ ' + data.message;
          resultEl.style.color = '#166534';
          // 清空输入框
          document.getElementById('cardNumber').value = '';
          document.getElementById('cardExpiry').value = '';
          document.getElementById('cardCvv').value = '';
          document.getElementById('cardName').value = '';
          document.getElementById('cardZip').value = '';
          // 刷新显示
          loadCardInfo();
        } else {
          resultEl.textContent = '❌ ' + (data.error || '更新失败');
          resultEl.style.color = '#991b1b';
        }
      } catch (e) {
        resultEl.textContent = '❌ 网络错误';
        resultEl.style.color = '#991b1b';
      }
    }
  </script>
</body>
</html>
